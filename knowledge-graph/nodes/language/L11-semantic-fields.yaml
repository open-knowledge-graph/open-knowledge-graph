id: L11-semantic-fields
type: knowledge
domain: language
name: "Semantic fields — word clusters by domain"
description: >
  Groups of words that share a semantic domain (money, time, currency).
  Used by the parser to detect question types and resolve implicit units.

provenance:
  attribution:
    source: "GSM8K domain word analysis"
    date: "2026-04-01"
  evidence:
    type: empirical
    description: "Semantic clusters from word problem corpus"

