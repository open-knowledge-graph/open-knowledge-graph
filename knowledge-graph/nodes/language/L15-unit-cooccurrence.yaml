id: L15-unit-cooccurrence
type: knowledge
domain: language
name: "Unit cooccurrence rules — implicit conversions when units appear together"
description: >
  When two unit words appear in the same problem, inject the conversion
  factor. "feet" + "inches" → 12. "hours" + "minutes" → 60.
  The conversion factors are math knowledge; the trigger (detecting
  which words co-occur) is language knowledge.

provenance:
  attribution:
    source: "Standard unit conversion triggers"
    date: "2026-04-01"
  evidence:
    type: axiomatic
    description: "English unit cooccurrence patterns in word problems"

cooccurrence_rules:
  - unit_a: ["feet", "foot"]
    unit_b: ["inch", "inches"]
    value: 12
    result_unit: inches

  - unit_a: ["hour", "hours"]
    unit_b: ["minute", "minutes"]
    value: 60
    result_unit: minutes

  - unit_a: ["day", "days"]
    unit_b: ["hour", "hours"]
    value: 24
    result_unit: hours

  - unit_a: ["month", "months"]
    unit_b: ["day", "days"]
    value: 30
    result_unit: days

  - unit_a: ["yard", "yards"]
    unit_b: ["feet", "foot"]
    value: 3
    result_unit: feet

  - unit_a: ["mile", "miles"]
    unit_b: ["feet", "foot"]
    value: 5280
    result_unit: feet

  - unit_a: ["dollar", "dollars"]
    unit_b: ["cent", "cents"]
    value: 100
    result_unit: cents
